# Run: shocklens run-case examples/wedge_oblique/case.yaml
# First produce the VTK: cd case && ./Allrun   (blockMesh, rhoCentralFoam, foamToVTK)
# then point `vtk` at the file foamToVTK wrote.
name: wedge15Ma5
vtk: examples/wedge_oblique/case/VTK/wedge15Ma5_1000.vtk
fields: [rho]            # your solver's density field name; aliases auto-resolve
detector: oblique_line   # use oblique_ransac for noisier / turbulent fields
nx: 300
ny: 160
mach: 5.0               # optional: turns on the theta-beta-M angle check
theta_deg: 15.0
